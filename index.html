<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">
    <title>GitHub Issues Tracker | Login</title>

    <!-- Tailwind + daisyUI -->


    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Style CSS -->

    <link rel="stylesheet" href="styles/style.css">

    <!-- Font Awesome -->

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>

<body class="md:bg-[#f8fafcFF] md:py-20">
    <section class="space-y-6 w-full md:w-[520px] p-8 mx-auto md:rounded-lg bg-white md:shadow-lg">

        <div class="flex flex-col items-center  space-y-6">
            <div>
                <img src="assets/github-logo.png" alt="">
            </div>

            <div class="space-y-1 text-center">
                <h2 class="text-2xl font-semibold text-[#1f2937FF]">GitHub Issues Tracker</h2>
                <p class="text-base text-[#64748bFF]">Sign in to manage your issues</p>
            </div>
        </div>

        <div class="flex justify-center items-center">
            <fieldset class="fieldset rounded-box max-sm:w-11/12 w-4/5 mb-6">

                <label class="label font-medium text-base tex-[#1f2937FF]">Username</label>
                <input id="input-username" type="text" class="w-full input text-base text-[#64748bFF]"
                    placeholder="Enter Username" />
                <p class="text-primary text-sm mb-4">Default: admin</p>

                <label class="label font-medium text-base tex-[#1f2937FF]">Password</label>
                <input id="input-password" type="password" class="w-full input text-base text-[#64748bFF]"
                    placeholder="Enter Password" />
                <p class="text-primary text-sm">Default: admin123</p>

                <button id="signin-btn" class="btn btn-primary mt-4">Sign In</button>
            </fieldset>
        </div>

        <div class="p-10 text-center bg-white flex items-center gap-2">
            <span class="bg-gray-200 flex-1 h-[1px] w-[204px]"></span>
            <span class="text-base text-[#1f2937FF] bg-white mx-2">OR</span>
            <span class="bg-gray-200 flex-1 h-[1px] w-[204px]"></span>
        </div>
        <div class="text-center">
            <p class="text-[#64748bFF]">Demo Credentials:</p>
            <div class="bg-[#f8fafcFF] rounded-lg text-center mx-auto max-sm:w-11/12 w-4/5 p-6">
                <p><strong>Username:</strong> admin</p>
                <p><strong>Password:</strong> admin123</p>
            </div>
        </div>
    </section>


    <dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
        <div class="modal-box">
            <p class="py-4 text-lg text-error font-bold"><i class="fa-solid fa-circle-exclamation"></i> Invaild Username
                or Password
            </p>
            <div class="modal-action">
                <form method="dialog">
                    <button class="btn">Close</button>
                </form>
            </div>
        </div>
    </dialog>
    <script src="scripts/index.js"></script>
</body>

</html>
