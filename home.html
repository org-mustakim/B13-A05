<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">
    <title>GitHub Issues Tracker | All</title>

    <!-- Tailwind + daisyUI -->


    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Style CSS -->

    <link rel="stylesheet" href="styles/style.css">

    <!-- Font Awesome -->

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>

<body class="bg-[#f8fafc]">
    <header
        class="bg-white border border-[#e9e9e9FF] flex max-md:flex-col max-md:gap-6 max-md:items-center justify-between shadow px-20 py-4">
        <div class="flex max-md:flex-wrap gap-1 text-center items-center">
            <img class="w-9 max-md:mx-auto max-sm:mb-2" src="assets/github-logo.png" alt="">
            <h2 class="max-sm:text-xl text-2xl font-semibold">GitHub Issues Tracker</h2>
        </div>
        <div class="flex gap-4 max-md:flex-col">
            <div>
                <label class="input">
                    <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                            stroke="currentColor">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.3-4.3"></path>
                        </g>
                    </svg>
                    <input type="search" required placeholder="Search" />
                </label>
            </div>
            <button class="btn rounded btn-primary"><i class="fa-solid fa-magnifying-glass"></i> Search Issue</button>
        </div>
    </header>

    <section class="container"></section>
</body>

</html>
