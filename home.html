<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">
    <title>GitHub Issues Tracker | All</title>

    <!-- Tailwind + daisyUI -->


    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Style CSS -->

    <link rel="stylesheet" href="styles/style.css">

    <!-- Font Awesome -->

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>

<body class="bg-[#f8fafc]">
    <header
        class="bg-white border border-[#e9e9e9FF] flex max-md:flex-col max-md:gap-6 max-md:items-center justify-between shadow px-20 py-4 max-w-screen-2xl mx-auto">



        <div class="flex max-md:flex-wrap gap-1 text-center items-center">
            <img class="w-9 max-md:mx-auto max-sm:mb-2" src="assets/github-logo.png" alt="">
            <h2 class="max-sm:text-xl text-2xl font-semibold">GitHub Issues Tracker</h2>
        </div>



        <div class="flex gap-4 max-md:flex-col">
            <div>
                <label class="input">
                    <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                            stroke="currentColor">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.3-4.3"></path>
                        </g>
                    </svg>
                    <input type="search" required placeholder="Search" />
                </label>
            </div>
            <button class="btn rounded btn-primary"><i class="fa-solid fa-magnifying-glass"></i> Search
                Issue</button>
        </div>



    </header>

    <section class="w-full md:px-60  md:mt-16 max-w-screen-2xl mx-auto">


        <div class="p-6 rounded-lg border-[0.25px] border-[#e4e4e7] shadow-sm">


            <div
                class="gap-2 btn-container max-md:mx-auto max-lg:flex max-lg:flex-wrap max-lg:items-center max-lg:justify-center">


                <button id="btn-1" onclick="activeBtn('btn-1')"
                    class="clickable-btn btn btn-primary w-24 max-md:w-[120px] font-semibold">All</button>
                <button id="btn-2" onclick="activeBtn('btn-2')"
                    class="clickable-btn btn btn-outline w-24 max-md:w-[120px] font-semibold">Open</button>
                <button id="btn-3" onclick="activeBtn('btn-3')"
                    class="clickable-btn btn btn-outline w-24 max-md:w-[120px] font-semibold">Closed</button>


            </div>


        </div>


    </section>

    <section class="w-full md:px-60  md:mt-4 max-w-screen-2xl mx-auto">


        <div
            class="flex flex-wrap justify-between border p-6 border-[#e4e4e7] rounded-t-lg gap-0 md:gap-4 max-md:gap-8">
            <div class="flex flex-wrap gap-2">

                <div class="bg-[#ece4ff] w-[50px] p-2 rounded-full flex justify-center items-center">
                    <img src="assets/Aperture.png" alt="">
                </div>

                <div class="gap-1">
                    <h2 class="text-[#1f2937] text-xl font-semibold"><span id="total-issue-in-container">0</span>
                        Issues
                    </h2>
                    <p class="text-base text-[#64748b]">Track and manage your project issues</p>
                </div>
            </div>

            <div class="flex max-lg:w-full max-lg:items-center gap-4 max-lg:gap-6 flex-wrap md:ml-[4px] max-sm:ml-14">
                <div class="flex items-center justify-center gap-2">
                    <div class="bg-[#00a96e] w-3 h-3 rounded-full"></div>
                    <p class="text-base font-medium">Open</p>
                </div>


                <div class="flex items-center gap-2">
                    <div class="bg-[#a855f7] w-3 h-3 rounded-full"></div>
                    <p class="text-base font-medium">Closed</p>
                </div>
            </div>

        </div>


    </section>

    <section class="w-full md:px-60 max-w-screen-2xl mx-auto">
        <div class="w-full border">

        </div>
    </section>

    <script src="scripts/home.js"></script>
</body>

</html>
